name: Build 3DSFin

# Runs on every push/PR so you always have a downloadable build without
# installing devkitPro locally. Tag a commit like "v0.1.0" to also publish
# it as a GitHub Release with the .3dsx attached.
on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    # Official devkitPro image: has devkitARM, libctru, citro2d/citro3d
    # preinstalled. We still need to grab the curl/mbedtls portlibs.
    container: devkitpro/devkitarm:latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install extra 3DS portlibs (curl, mbedtls)
        run: |
          dkp-pacman -Sy --noconfirm 3ds-curl 3ds-mbedtls 3ds-zlib || true

      - name: Build
        run: |
          make -j"$(nproc)"

      - name: Verify output exists
        run: |
          test -f 3dsfin.3dsx
          ls -la 3dsfin.3dsx

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: 3dsfin-3dsx
          path: 3dsfin.3dsx
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: 3dsfin-3dsx

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: 3dsfin.3dsx
          generate_release_notes: true
